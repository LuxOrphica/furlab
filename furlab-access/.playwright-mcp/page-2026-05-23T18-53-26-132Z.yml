                    - img [ref=e1422]
                - paragraph [ref=e1424]:
                  - text: Anthropic's
                  - link "Claude Design" [ref=e1425] [cursor=pointer]:
                    - /url: https://x.com/claudeai/status/2045156267690213649
                  - text: (released 2026-04-17, Opus 4.7) showed what happens when an LLM stops writing prose and starts shipping design artifacts. It went viral — and stayed closed-source, paid-only, cloud-only, locked to Anthropic's model and Anthropic's skills. There is no checkout, no self-host, no Vercel deploy, no swap-in-your-own-agent.
                - paragraph [ref=e1426]:
                  - strong [ref=e1427]: Open Design (OD) is the open-source alternative.
                  - text: Same loop, same artifact-first mental model, none of the lock-in. We don't ship an agent — the strongest coding agents already live on your laptop. We wire them into a skill-driven design workflow that runs locally with
                  - code [ref=e1428]: pnpm tools-dev
                  - text: ", can deploy the web layer to Vercel, and stays BYOK at every layer."
                - paragraph [ref=e1429]:
                  - text: Type
                  - code [ref=e1430]: make me a magazine-style pitch deck for our seed round
                  - text: . The interactive question form pops up before the model improvises a single pixel. The agent picks one of five curated visual directions. A live
                  - code [ref=e1431]: TodoWrite
                  - text: plan streams into the UI. The daemon builds a real on-disk project folder with a seed template, layout library, and self-check checklist. The agent reads them — pre-flight enforced — runs a five-dimensional critique against its own output, and emits a single
                  - code [ref=e1432]: <artifact>
                  - text: that renders in a sandboxed iframe seconds later.
                - paragraph [ref=e1433]: That's not "AI tries to design something". That's an AI that has been trained, by the prompt stack, to behave like a senior designer with a working filesystem, a deterministic palette library, and a checklist culture — exactly the bar Claude Design set, but open and yours.
                - paragraph [ref=e1434]: "OD stands on four open-source shoulders:"
                - list [ref=e1435]:
                  - listitem [ref=e1436]:
                    - link "alchaincyf/huashu-design" [ref=e1437] [cursor=pointer]:
                      - /url: https://github.com/alchaincyf/huashu-design
                      - strong [ref=e1438]:
                        - code [ref=e1439]: alchaincyf/huashu-design
                    - text: — the design-philosophy compass. Junior-Designer workflow, the 5-step brand-asset protocol, the anti-AI-slop checklist, the 5-dimensional self-critique, and the "5 schools × 20 design philosophies" idea behind our direction picker — all distilled into
