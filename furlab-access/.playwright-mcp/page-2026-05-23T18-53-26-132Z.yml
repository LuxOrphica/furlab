                - paragraph [ref=e2756]:
                  - text: Open Design ships a stdio MCP server. Wire it into Claude Code, Codex, Cursor, VS Code, Antigravity, Zed, Windsurf, or any MCP-compatible client and the agent in another repo can read files from your local Open Design projects directly. Replaces the export-then-attach loop. When the agent calls
                  - code [ref=e2757]: search_files
                  - text: ","
                  - code [ref=e2758]: get_file
                  - text: ", or"
                  - code [ref=e2759]: get_artifact
                  - text: without a project argument, the MCP defaults to whatever project (and file) you have open in Open Design right now, so prompts like
                  - emphasis [ref=e2760]: "\"build this in my app\""
                  - text: or
                  - emphasis [ref=e2761]: "\"match these styles\""
                  - text: just work.
                - paragraph [ref=e2762]:
                  - strong [ref=e2763]: Why MCP?
                  - text: Exporting and re-attaching a zip every design iteration breaks flow. The MCP server exposes your design source directly -- tokens CSS, JSX components, entry HTML -- as a structured API the agent can query by name. The agent always sees the live file, not a stale copy from the last export.
                - paragraph [ref=e2764]:
                  - text: Open
                  - strong [ref=e2765]: Settings → MCP server
                  - text: in the Open Design app for a per-client install flow. The panel bakes the absolute path to your
                  - code [ref=e2766]: node
                  - text: binary and the daemon's built
                  - code [ref=e2767]: cli.js
                  - text: into every snippet, so it works on a fresh source clone where
                  - code [ref=e2768]: od
                  - text: is not on your PATH. Cursor gets a one-click deeplink; the rest get a copy-paste JSON snippet in the schema their config file expects (Claude Code includes a
                  - code [ref=e2769]: claude mcp add-json
                  - text: one-liner so you do not have to hand-edit
                  - code [ref=e2770]: ~/.claude.json
                  - text: ). Restart or reload your client after install for the server to show up.
                - paragraph [ref=e2771]:
                  - text: The daemon must be running locally for MCP tool calls to succeed. If the agent was started before Open Design, restart the agent after Open Design is up so it can reach the live daemon. Tool calls made while the daemon is offline return a clear
                  - code [ref=e2772]: "\"daemon not reachable\""
                  - text: error rather than a crash.
                - paragraph [ref=e2773]:
                  - strong [ref=e2774]: Security model.
                  - text: "The MCP server is read-only; it exposes file reads, file metadata, and search -- nothing that writes to disk or calls an external service. It runs as a child process of the coding agent over stdio, so any MCP client you register inherits read access to your local Open Design projects. Treat it like installing a VS Code extension: only register clients you trust. The daemon binds to"
                  - code [ref=e2775]: 127.0.0.1
                  - text: by default; LAN-wide exposure requires an explicit
                  - code [ref=e2776]: OD_BIND_HOST
                  - text: opt-in. If you also front the SPA with a non-loopback static server, set
                  - code [ref=e2777]: OD_ALLOWED_ORIGINS=<origin1>,<origin2>,...
                  - text: (comma-separated
                  - code [ref=e2778]: scheme://host[:port]
                  - text: entries) so the daemon's same-origin gate accepts API writes from those origins on both the
                  - code [ref=e2779]: Origin
                  - text: and
                  - code [ref=e2780]: Host
                  - text: checks; without it the browser will see 403s on every PUT/POST (Caddy v2 reverse_proxy preserves the original Host header upstream by default, so loopback alone is not enough). Connector-credential and live-artifact preview routes stay loopback-only regardless.
