                - paragraph [ref=e269]:
                  - text: The adapter layer is OD's most load-bearing design decision. We delegate the
                  - strong [ref=e270]: entire agent loop
                  - text: — model calls, tool use, context management, permission handling, resume, cancel — to the user's existing code agent CLI. OD's job is to detect it, feed it a skill + prompt + working directory, and stream its output back to the web UI.
                - paragraph [ref=e271]:
                  - text: If you're adding a new ACP-backed runtime, start with
                  - link "new-agent-runtime-acp.md" [ref=e272] [cursor=pointer]:
                    - /url: /nexu-io/open-design/blob/main/docs/new-agent-runtime-acp.md
                    - code [ref=e273]: new-agent-runtime-acp.md
                  - text: for the expected stdio transport, JSON-RPC message flow, and process lifecycle contract.
                - blockquote [ref=e274]:
                  - paragraph [ref=e275]:
                    - strong [ref=e276]: "Thesis:"
                    - text: The code agent space has already converged on a few strong implementations (Claude Code, Codex, Devin for Terminal, Cursor Agent, Gemini CLI, OpenCode, OpenClaw, Qoder CLI). Reimplementing another one is worse than just talking to all of them.
                  - paragraph [ref=e277]:
                    - strong [ref=e278]: "Inspiration:"
                    - link "multica" [ref=e279] [cursor=pointer]:
                      - /url: https://github.com/multica-ai/multica
                    - text: (PATH-scan detection + daemon architecture) and
                    - link "cc-switch" [ref=e280] [cursor=pointer]:
                      - /url: https://github.com/farion1231/cc-switch
                    - text: (per-agent config format knowledge + symlink-based skill distribution).
                - separator [ref=e281]
                - generic [ref=e282]:
                  - heading "1. Adapter interface (TypeScript)" [level=2] [ref=e283]
                  - 'link "Permalink: 1. Adapter interface (TypeScript)" [ref=e284] [cursor=pointer]':
                    - /url: "#1-adapter-interface-typescript"
                    - img [ref=e285]
                - paragraph [ref=e287]:
                  - text: Every adapter implements this interface. The current adapter implementation lives in
                  - link "apps/daemon/src/agents.ts" [ref=e288] [cursor=pointer]:
                    - /url: /nexu-io/open-design/blob/main/apps/daemon/src/agents.ts
                    - code [ref=e289]: apps/daemon/src/agents.ts
                  - text: .
                - generic [ref=e290]:
                  - generic [ref=e291]:
                    - text: "interface AgentAdapter { readonly id: string; // \"claude-code\" | \"codex\" | … readonly displayName: string; // -- discovery -------------------------------------------------- detect(): Promise<AgentDetection | null>; // null if not installed // -- capability negotiation ------------------------------------ capabilities(): AgentCapabilities; // -- execution ------------------------------------------------- run(params: AgentRunParams): AsyncIterable<AgentEvent>; cancel(runId: string): Promise<"
                    - generic [ref=e292]: void
                    - text: ">; resume?(runId: string, message: string): AsyncIterable<AgentEvent>; } interface AgentDetection { executablePath: string; // absolute path to CLI version: string; configDir?: string; // e.g. ~/.claude skillsDir?: string; // e.g. ~/.claude/skills authState: \"ok\" | \"missing\" | \"expired\"; } interface AgentCapabilities { surgicalEdit: boolean; // can edit a targeted region without rewriting file nativeSkillLoading: boolean; // picks up ~/.<agent>/skills/ automatically streaming: boolean; // emits tool calls in real time resume: boolean; // can continue an interrupted run permissionMode: \"strict\" | \"permissive\" | \"none\"; contextWindowHint?: number; // in tokens } interface AgentRunParams { runId: string; cwd: string; // absolute path — artifact dir systemPrompt: string; // skill's SKILL.md body + DESIGN.md excerpt userPrompt: string; skillDir?: string; // if set, adapter should make skill files available allowedTools?: string[]; // for agents that support it timeoutMs?: number; } type AgentEvent = | { type: \"thinking\"; text: string } | { type: \"tool_call\"; name: string; input: unknown; id: string } | { type: \"tool_result\"; id: string; output: unknown } | { type: \"text_delta\"; text: string } | { type: \"file_write\"; path: string } // synthesized by adapter if agent doesn't emit natively | { type: \"error\"; error: string } | { type: \"done\"; reason: \"completed\" | \"cancelled\" | \"error\" };"
                  - button "Copy code to clipboard" [ref=e294] [cursor=pointer]:
                    - img [ref=e295]
                - generic [ref=e298]:
                  - heading "2. Detection strategy" [level=2] [ref=e299]
                  - 'link "Permalink: 2. Detection strategy" [ref=e300] [cursor=pointer]':
                    - /url: "#2-detection-strategy"
                    - img [ref=e301]
                - paragraph [ref=e303]:
                  - text: Run all adapters'
                  - code [ref=e304]: detect()
                  - text: in parallel on daemon start, then cache results in
                  - code [ref=e305]: ~/.open-design/agents.json
                  - text: with a 24h TTL. Re-detect on daemon
                  - code [ref=e306]: SIGHUP
                  - text: .
                - paragraph [ref=e307]:
                  - text: Each adapter uses
                  - strong [ref=e308]: two signals
                  - text: ":"
                - list [ref=e309]:
                  - listitem [ref=e310]:
                    - strong [ref=e311]: PATH scan.
                    - code [ref=e312]: which <binary>
                    - text: for each known executable name. Fast (<10ms).
                  - listitem [ref=e313]:
                    - strong [ref=e314]: Config-dir probe.
                    - text: Check for
                    - code [ref=e315]: ~/.claude/
                    - text: ","
                    - code [ref=e316]: ~/.codex/
                    - text: ","
                    - code [ref=e317]: ~/.cursor/
                    - text: ", etc. This catches cases where the CLI was installed via npm global into a shell-specific PATH."
                - paragraph [ref=e318]:
                  - text: If both signals agree, detection is confident. If only one signal fires, we mark
                  - code [ref=e319]: "authState: \"missing\""
                  - text: and prompt the user to run the CLI's auth flow.
