          - generic [ref=e138]:
            - paragraph [ref=e139]:
              - text: ✊
              - strong [ref=e140]:
                - code [ref=e141]: 305 PRs
                - text: ·
                - code [ref=e142]: 75 contributors
                - text: · 7 days
              - text: —
              - strong [ref=e143]: This isn't a release. It's a starting gun.
              - text: We rebuilt Open Design's core. Then we ported the old world into it.
            - paragraph [ref=e144]: "Three things are different underneath now:"
            - list [ref=e145]:
              - listitem [ref=e146]:
                - text: 🧩
                - strong [ref=e147]: Everything is a plugin.
                - text: The engine stays small and boring. Design systems, slices, prototypes, exports, and every legacy workflow — including Figma itself — all live in plugins. You write a plugin; you migrate a piece of the industry.
              - listitem [ref=e148]:
                - text: 🌐
                - strong [ref=e149]: Headless by default.
                - text: The desktop app is a thin wrapper around the CLI. The same engine runs in Claude Code, OpenClaw, Hermes Agent, or straight inside a Lark / Discord / Slack chat. Design stops being a place you go and becomes a capability your agents have.
              - listitem [ref=e150]:
                - text: ♻️
                - strong [ref=e151]: Plugins create plugins.
                - text: OD CLI wraps GitHub CLI, so an agent can clone the repo, scaffold a plugin, and open a PR — for you, or for itself. The engine grows itself, in public, with you in the loop.
            - paragraph [ref=e152]: "Two movements behind the rebuild:"
            - list [ref=e153]:
              - listitem [ref=e154]:
                - text: 🥊
                - strong [ref=e155]: "#DeFigma — kill the canvas, keep the craft."
                - text: Figma isn't broken. It's just the wrong unit of work in an agent-native world. A design system shouldn't be a file you maintain. A prototype shouldn't be 200 frames you nudge by hand. The canvas was a workaround for not having a real engine. We have an engine now.
              - listitem [ref=e156]:
                - text: 🤖
                - strong [ref=e157]: Agent-Native Design — the designer becomes the director.
                - text: Agent-driven design is no longer a demo. It's shipping production-grade design systems, world-class UI, decks, prototypes — for people who cannot draw a rectangle. The 10×–100× productivity jump people kept promising for AI tooling? It's here. The human gives intent, not coordinates.
            - paragraph [ref=e158]:
              - text: This is the first release where both movements are real in the same engine.
              - link "Full announcement and discussion thread →" [ref=e159] [cursor=pointer]:
                - /url: https://github.com/nexu-io/open-design/discussions/1727
            - heading "🔥 Highlights" [level=2] [ref=e160]
            - list [ref=e161]:
              - listitem [ref=e162]:
                - text: 🧩
                - strong [ref=e163]: Plugin engine rebuild.
                - text: Open Design's research-preview architecture has been replaced with a small, boring engine plus a plugin surface — every workflow from design-system templates and slices to prototypes, exports, and Figma itself is now a plugin. Engine stays small on purpose so the industry can be ported into it one plugin at a time. Thanks
                - link "@bulai0408" [ref=e164] [cursor=pointer]:
                  - /url: https://github.com/bulai0408
                - text: ","
                - link "@YUHAO-corn" [ref=e165] [cursor=pointer]:
                  - /url: https://github.com/YUHAO-corn
                - text: ","
                - link "@xxiaoxiong" [ref=e166] [cursor=pointer]:
                  - /url: https://github.com/xxiaoxiong
                - text: ", and everyone who shaped the new shape."
              - listitem [ref=e167]:
                - text: 🌐
                - strong [ref=e168]: Headless by default.
                - text: The desktop app is now a thin wrapper around the OD CLI. The same engine runs from Claude Code, OpenClaw, Hermes Agent, and chat bots in Lark / Discord / Slack — design becomes a capability your agents have, not a place you visit. Custom CLI agent profiles ship in this release. (
                - link "#378" [ref=e169] [cursor=pointer]:
                  - /url: https://github.com/nexu-io/open-design/pull/378
                - text: ) Thanks
                - link "@fuyizheng3120" [ref=e170] [cursor=pointer]:
                  - /url: https://github.com/fuyizheng3120
                - text: .
              - listitem [ref=e171]:
                - text: ♻️
                - strong [ref=e172]: Plugins create plugins.
                - text: OD CLI wraps GitHub CLI, so an agent can clone the repo, scaffold a plugin, and open a PR — for you, or for itself. The Publish-repo flow now correctly creates the author's GitHub repo (
