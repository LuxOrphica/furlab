<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dark Line Arrow Tool</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="panel controls">
      <h1>Поиск тёмной линии и стрелка</h1>
      <p class="muted">Загрузите изображение. Инструмент найдёт чёрную линию и нарисует стрелку строго вдоль неё.</p>

      <label class="file-input">
        <span>Загрузить изображение</span>
        <input id="fileInput" type="file" accept="image/*" />
      </label>

      <div class="row">
        <label for="darkPercent">Доля самых тёмных пикселей: <strong id="darkPercentValue">2%</strong></label>
        <input id="darkPercent" type="range" min="1" max="12" value="2" />
      </div>

      <div class="row row-title">Параметры маски светлой зоны</div>

      <div class="row">
        <label for="maskValMin">Мин. яркость: <strong id="maskValMinValue">68</strong></label>
        <input id="maskValMin" type="range" min="20" max="180" value="68" />
      </div>

      <div class="row">
        <label for="maskValMax">Макс. яркость: <strong id="maskValMaxValue">240</strong></label>
        <input id="maskValMax" type="range" min="180" max="255" value="240" />
      </div>

      <div class="row">
        <label for="maskSatMax">Макс. насыщенность: <strong id="maskSatMaxValue">30%</strong></label>
        <input id="maskSatMax" type="range" min="8" max="55" value="30" />
      </div>

      <div class="row">
        <label for="maskColorDist">Допуск по цвету: <strong id="maskColorDistValue">74</strong></label>
        <input id="maskColorDist" type="range" min="25" max="130" value="74" />
      </div>

      <div class="row">
        <label for="maskInsetMm">Отступ от края (мм): <strong id="maskInsetMmValue">1.6</strong></label>
        <input id="maskInsetMm" type="range" min="0.3" max="4.0" step="0.1" value="1.6" />
      </div>

      <div class="row">
        <label for="antiFur">Анти-мех: <strong id="antiFurValue">55%</strong></label>
        <input id="antiFur" type="range" min="0" max="100" value="55" />
      </div>

      <div class="actions">
        <button id="analyzeBtn" type="button">Найти линию</button>
        <button id="contourBtn" type="button">Контур светлой зоны</button>
      </div>

      <p id="status" class="status">Ожидание загрузки изображения.</p>
    </section>

    <section class="panel stage">
      <div class="canvas-wrap">
        <div class="caption">Исходник</div>
        <canvas id="sourceCanvas"></canvas>
      </div>
      <div class="canvas-wrap">
        <div class="caption">Результат: стрелка и контур</div>
        <canvas id="resultCanvas"></canvas>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
